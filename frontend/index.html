<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENT Clinic - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0e7ff 100%);
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 1.5rem;
        }
        .tab {
            flex: 1;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
        }
        .tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }
        .hidden {
            display: none;
        }
        .brand-logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .brand-logo svg {
            width: 48px;
            height: 48px;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="card auth-card">
        <div class="brand-logo">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 013 12c0-1.605.42-3.113 1.157-4.418" />
            </svg>
            <h2>ENT Specialty Clinic</h2>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Login</div>
            <div class="tab" onclick="switchTab('register')">Register</div>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" class="form-control" required placeholder="Enter email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-pass" class="form-control" required placeholder="Enter password">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>

        <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="reg-email" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-pass" class="form-control" required>
            </div>
            <div class="grid grid-cols-2" style="gap: 1rem;">
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" id="reg-age" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select id="reg-gender" class="form-control" required>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Contact Number</label>
                <input type="text" id="reg-contact" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Register as Patient</button>
        </form>

        <form id="otp-form" class="hidden" onsubmit="handleVerifyOtp(event)">
            <h3 class="mb-4 text-center">Verify Email</h3>
            <p class="text-center mb-4 text-muted" style="font-size: 0.9rem">Please enter the 6-digit OTP sent to your email.</p>
            <div class="form-group">
                <label>OTP</label>
                <input type="text" id="verify-otp" class="form-control" required maxlength="6" pattern="\d{6}">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Verify & Login</button>
        </form>
    </div>

    <script src="js/api.js"></script>
    <script>
        let currentRegistrationEmail = '';

        // Redirect if already logged in
        window.onload = () => {
            const user = localStorage.getItem('user');
            if (user) {
                const role = JSON.parse(user).role;
                if (role === 'patient') window.location.href = 'pages/patient-dashboard.html';
                else if (role === 'doctor') window.location.href = 'pages/doctor-dashboard.html';
                else if (role === 'admin') window.location.href = 'pages/admin-dashboard.html';
            }
        };

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('otp-form').classList.add('hidden');

            if (tab === 'login') {
                document.getElementById('login-form').classList.remove('hidden');
                document.getElementById('register-form').classList.add('hidden');
            } else {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('register-form').classList.remove('hidden');
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value;

            try {
                const res = await api.request('/auth/login', 'POST', { email, password });
                localStorage.setItem('token', res.token);
                localStorage.setItem('user', JSON.stringify(res.user));
                
                showNotification('Login successful', 'success');
                setTimeout(() => {
                    if (res.user.role === 'patient') window.location.href = 'pages/patient-dashboard.html';
                    else if (res.user.role === 'doctor') window.location.href = 'pages/doctor-dashboard.html';
                    else if (res.user.role === 'admin') window.location.href = 'pages/admin-dashboard.html';
                }, 1000);
            } catch (err) {
                console.error(err);
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const email = document.getElementById('reg-email').value;
            const payload = {
                name: document.getElementById('reg-name').value,
                email: email,
                password: document.getElementById('reg-pass').value,
                age: Number(document.getElementById('reg-age').value),
                gender: document.getElementById('reg-gender').value,
                contact: document.getElementById('reg-contact').value,
                medicalHistory: {}
            };

            try {
                const res = await api.request('/auth/register', 'POST', payload);
                currentRegistrationEmail = email;
                
                showNotification(res.message || 'OTP sent successfully', 'success');
                
                // Show OTP form
                document.getElementById('register-form').classList.add('hidden');
                document.getElementById('otp-form').classList.remove('hidden');
            } catch (err) {}
        }

        async function handleVerifyOtp(e) {
            e.preventDefault();
            const otp = document.getElementById('verify-otp').value;

            try {
                const res = await api.request('/auth/verify-otp', 'POST', { email: currentRegistrationEmail, otp });
                localStorage.setItem('token', res.token);
                localStorage.setItem('user', JSON.stringify(res.user));
                
                showNotification('Registration & Verification successful', 'success');
                setTimeout(() => {
                    window.location.href = 'pages/patient-dashboard.html';
                }, 1000);
            } catch (err) {}
        }
    </script>
</body>
</html>
