<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ENT Clinic</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container nav-content">
            <a href="#" class="brand">ENT Clinic - Admin Panel</a>
            <div class="d-flex align-center gap-4">
                <span id="user-name" style="font-weight: 500;">System Admin</span>
                <button class="btn btn-outline" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4 grid" style="grid-template-columns: 250px 1fr; gap: 2rem;">
        
        <div class="card" style="height: fit-content;">
            <h3 class="mb-4">Admin Menu</h3>
            <div class="grid" style="gap: 1rem;">
                <button class="btn btn-primary btn-block text-center" onclick="showSection('stats-section')">Dashboard Stats</button>
                <button class="btn btn-outline btn-block text-center" onclick="showSection('add-dept-section')">Add Department</button>
                <button class="btn btn-outline btn-block text-center" onclick="showSection('add-doc-section')">Add Doctor</button>
            </div>
        </div>

        <div>
            <!-- Stats Section -->
            <div id="stats-section" class="section">
                <h2 class="mb-4">System Overview</h2>
                <div class="grid grid-cols-3 mb-4">
                    <div class="card text-center">
                        <h3 class="mb-2 text-muted">Total Patients</h3>
                        <h1 id="stat-patients" style="font-size: 2.5rem; color: var(--primary-color);">0</h1>
                    </div>
                    <div class="card text-center">
                        <h3 class="mb-2 text-muted">Total Doctors</h3>
                        <h1 id="stat-doctors" style="font-size: 2.5rem; color: var(--primary-color);">0</h1>
                    </div>
                    <div class="card text-center">
                        <h3 class="mb-2 text-muted">Total Appointments</h3>
                        <h1 id="stat-appointments" style="font-size: 2.5rem; color: var(--primary-color);">0</h1>
                    </div>
                </div>
                
                <h3 class="mb-4 mt-4">Appointments By Department</h3>
                <div id="dept-stats" class="grid grid-cols-2"></div>
            </div>

            <!-- Add Dept Section -->
            <div id="add-dept-section" class="section hidden card">
                <h2 class="mb-4">Add New Department</h2>
                <form onsubmit="addDepartment(event)">
                    <div class="form-group">
                        <label>Department Name</label>
                        <input type="text" id="dept-name" class="form-control" required placeholder="e.g. Audiology">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="dept-desc" class="form-control" rows="3" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Department</button>
                </form>
            </div>

            <!-- Add Doctor Section -->
            <div id="add-doc-section" class="section hidden card">
                <h2 class="mb-4">Add New Doctor</h2>
                <form onsubmit="addDoctor(event)">
                    <div class="grid grid-cols-2" style="gap: 1rem;">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="doc-name" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="doc-email" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Temporary Password</label>
                            <input type="password" id="doc-pass" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Experience (Years)</label>
                            <input type="number" id="doc-exp" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Department</label>
                            <select id="doc-dept" class="form-control" required></select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary mt-4">Save Doctor</button>
                </form>
            </div>
        </div>

    </div>

    <script src="../js/api.js"></script>
    <script src="../js/admin.js"></script>
    <style>
        .hidden { display: none !important; }
    </style>
</body>
</html>
